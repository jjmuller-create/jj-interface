<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJ - Interface de Elite</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#131314">
    <style>
        :root { --bg: #131314; --chat-bg: #1e1f20; --text: #e3e3e3; --accent: #8ab4f8; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .logo { width: 24px; height: 24px; background: linear-gradient(45deg, #4285f4, #9b72cb); border-radius: 50%; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 25px; }
        .msg { max-width: 80%; line-height: 1.6; font-size: 16px; }
        .user { align-self: flex-end; background: #2b2c2f; padding: 12px 18px; border-radius: 18px; }
        .jj { align-self: flex-start; display: flex; gap: 12px; }
        #input-container { padding: 20px 10% 40px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 800px; background: var(--chat-bg); border-radius: 28px; padding: 10px 20px; display: flex; border: 1px solid #444; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <header><div class="logo"></div> JJ</header>
    <div id="chat">
        <div class="jj">Bem-vindo, Senhor. Nível 1 ativo. Por onde começamos nosso mapeamento?</div>
    </div>
    <div id="input-container">
        <div class="box">
            <input type="text" id="in" placeholder="Digite uma instrução..." onkeypress="if(e.key==='Enter')send()">
            <button onclick="send()">➔</button>
        </div>
    </div>
    <script>
        async function send() {
            const i = document.getElementById('in');
            const t = i.value.trim(); if(!t) return;
            add(t, 'user'); i.value = '';
            const r = await fetch('https://jjmuller.onrender.com/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: t})
            });
            const d = await r.json(); add(d.jj_response, 'jj');
        }
        function add(t, c) {
            const d = document.createElement('div'); d.className = 'msg ' + c;
            d.innerText = t; document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>

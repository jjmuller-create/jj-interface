<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJ - Interface de Elite</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#131314">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4712/4712139.png">

    <style>
        :root {
            --bg-color: #131314;
            --chat-bg: #1e1f20;
            --text-color: #e3e3e3;
            --accent-color: #8ab4f8;
            --user-msg-bg: #2b2c2f;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            font-size: 18px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #333;
            background-color: var(--bg-color);
            z-index: 10;
        }

        .jj-logo {
            width: 28px;
            height: 28px;
            background: linear-gradient(45deg, #4285f4, #9b72cb);
            border-radius: 50%;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 5%;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            line-height: 1.6;
            font-size: 16px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            padding: 12px 18px;
            border-radius: 20px;
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .jj-message {
            align-self: flex-start;
            display: flex;
            gap: 12px;
            background-color: transparent;
        }

        .avatar-chat {
            width: 32px;
            height: 32px;
            background: #333;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: var(--accent-color);
        }

        #input-area {
            padding: 15px 5% 30px 5%;
            background-color: var(--bg-color);
        }

        .input-wrapper {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--chat-bg);
            border-radius: 28px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            border: 1px solid #444;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within { border-color: #666; }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 10px 0;
        }

        .send-btn {
            background: transparent;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        @media (min-width: 1024px) {
            #chat-container, #input-area { padding-left: 20%; padding-right: 20%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="jj-logo"></div>
        <span>JJ - Consultor Particular</span>
    </header>

    <div id="chat-container">
        <div class="jj-message">
            <div class="avatar-chat" style="background: linear-gradient(45deg, #4285f4, #9b72cb); color: white;">JJ</div>
            <div>Bem-vindo, Senhor. Nível 1 consolidado. A partir de agora, o que o Senhor me disser será devidamente catalogado nos núcleos de memória. Como deseja iniciar nosso mapeamento?</div>
        </div>
    </div>

    <div id="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Fale com o JJ..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const API_URL = "https://jjmuller.onrender.com/chat";

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            input.value = '';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();
                appendMessage(data.jj_response, 'jj-message');
            } catch (error) {
                appendMessage('Senhor, tive um problema de ligação. Verifique se o servidor está ativo.', 'jj-message');
            }
        }

        function appendMessage(text, className) {
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            if (className === 'jj-message') {
                msgDiv.innerHTML = `<div class="avatar-chat">JJ</div><div>${text}</div>`;
            } else {
                msgDiv.innerText = text;
            }
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('PWA Erro:', err));
            });
        }
    </script>
</body>
</html>
